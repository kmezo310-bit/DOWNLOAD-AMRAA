<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amraa | Master Your Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* تحسين الحاوية بأسلوب Glassmorphism */
        .container {
            text-align: center;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            width: 150px;
            margin-bottom: 25px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s ease;
        }

        .logo:hover { transform: translateY(-10px) scale(1.02); }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        p { opacity: 0.8; margin-bottom: 40px; line-height: 1.6; font-size: 1.1rem; }

        /* زر التحميل بتصميم فخم */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.5);
            filter: brightness(1.2);
        }

        .icon { width: 24px; height: 24px; filter: invert(1); }

        .footer { position: absolute; bottom: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <img src="snapedit_1777727262782 (1).png" class="logo" alt="Amraa Logo">
    <h1>Amraa</h1>
    <p>Break habits. Build discipline.<br>Take control of your life today.</p>

    <a href="app-release.apk" class="btn" download>
        <img src="https://cdn-icons-png.flaticon.com/512/226/226770.png" class="icon" alt="Android">
        Download APK
    </a>
</div>

<div class="footer">
    &copy; 2026 Amraa. All rights reserved.
</div>

</body>
</html>
